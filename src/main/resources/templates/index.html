<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelControl - Bienvenido</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            color: #f8fafc;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid #334155;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #fbbf24; /* Dorado */
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffffff;
        }
        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: inline-block;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-primary {
            background-color: #fbbf24;
            color: #0f172a;
        }
        .btn-primary:hover {
            background-color: #f59e0b;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background-color: transparent;
            color: #fbbf24;
            border: 2px solid #fbbf24;
        }
        .btn-secondary:hover {
            background-color: rgba(251, 191, 36, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏨 HotelControl</div>
        <h1>Sistema de Gestión Hotelera</h1>
        <p>Bienvenido a nuestra plataforma transaccional. Aquí podrá consultar la disponibilidad de nuestras habitaciones en tiempo real, gestionar sus reservas y controlar de forma eficiente su estancia.</p>
        <div class="btn-group">
            <a href="/login" class="btn btn-primary">Iniciar Sesión</a>
            <a href="/registro" class="btn btn-secondary">Registrarse como Cliente</a>
        </div>
    </div>
</body>
</html>
