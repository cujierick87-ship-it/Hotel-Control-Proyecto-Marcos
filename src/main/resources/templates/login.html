<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelControl - Iniciar Sesión</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #ffffff;
            font-size: 26px;
            margin-bottom: 5px;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        .alert-error {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #fbbf24;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-submit:hover {
            background-color: #f59e0b;
        }
        .login-footer {
            margin-top: 25px;
            text-align: center;
        }
        .login-footer a {
            color: #fbbf24;
            text-decoration: none;
            font-size: 14px;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2>Iniciar Sesión</h2>
            <p>Acceda a su cuenta de HotelControl</p>
        </div>

        <div class="alert-error" th:if="${error}" th:text="${error}">
            Mensaje de error simulado
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="nombreUsuario">Usuario</label>
                <input type="text" id="nombreUsuario" name="nombreUsuario" placeholder="Ingrese su usuario" required>
            </div>
            
            <div class="form-group">
                <label for="passwordHash">Contraseña</label>
                <input type="password" id="passwordHash" name="passwordHash" placeholder="Ingrese su contraseña" required>
            </div>
            
            <button type="submit" class="btn-submit">Ingresar</button>
        </form>

        <div class="login-footer">
            <a href="/registro">¿No tiene cuenta? Regístrese aquí</a>
        </div>
    </div>
</body>
</html>
