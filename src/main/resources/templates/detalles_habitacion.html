<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Detalle de Habitación</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

        <style>
            *{
                box-sizing:border-box;
                margin:0;
                padding:0;
                font-family:'Segoe UI',sans-serif
            }
            body{
                background:#f8f9fa;
                color:#333
            }
            .navbar{
                background:#1e293b;
                padding:15px 50px;
                display:flex;
                align-items:center;
            }

            .brand{
                color:#eab308;
                text-decoration:none;
                font-size:20px;
                font-weight:bold;
                display:flex;
                align-items:center;
                gap:10px;
            }

            .brand img{
                width:36px;
                height:36px;
                object-fit:cover;
                border-radius:6px;
                background:white;
            }
            .container{
                max-width:1100px;
                margin:35px auto;
                background:white;
                padding:35px;
                border-radius:8px;
                box-shadow:0 4px 12px #0001
            }
            h1{
                text-align:center;
                color:#d4af37;
                text-transform:uppercase;
                letter-spacing:2px;
                margin-bottom:25px
            }
            .layout{
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:35px
            }
            .foto{
                width:100%;
                height:330px;
                object-fit:cover;
                border-radius:6px;
                margin-bottom:18px
            }
            .desc{
                line-height:1.7;
                color:#555;
                margin-bottom:18px
            }
            .features{
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:10px;
                background:#f8f9fa;
                padding:15px;
                border:1px solid #e5e7eb
            }
            .features div{
                font-size:14px
            }
            .features b{
                color:#1e293b
            }
            .right{
                border:1px solid #e5e7eb;
                border-radius:8px;
                padding:20px;
                text-align:center
            }
            .right h3{
                color:#d4af37;
                margin-bottom:15px
            }
            .btn{
                display:block;
                background:#e5c158;
                color:white;
                text-align:center;
                text-decoration:none;
                padding:14px;
                margin-top:20px;
                font-weight:bold
            }
            .btn:hover{
                background:#d4af37
            }
            .volver{
                display:block;
                text-align:center;
                margin-top:20px;
                color:#666;
                text-decoration:none
            }
            .flatpickr-calendar.inline{
                width:100%!important;
                box-shadow:none!important;
                border:1px solid #e2e8f0
            }
            .flatpickr-innerContainer,.flatpickr-rContainer,.dayContainer,.flatpickr-days{
                width:100%!important
            }
            .flatpickr-day{
                max-width:none!important;
                height:42px!important;
                line-height:42px!important
            }
            .fecha-reservada{
                background:#ef4444!important;
                color:white!important;
                border-color:#ef4444!important
            }
            @media(max-width:800px){
                .layout{
                    grid-template-columns:1fr
                }
            }
            .logo-menu{
                padding:18px 20px;
                color:#fbbf24;
                display:flex;
                align-items:center;
                gap:10px;
                font-weight:bold;
                font-size:18px;
            }

            .logo-menu img{
                width:38px;
                height:38px;
                object-fit:cover;
                border-radius:6px;
                background:white;
            }

            .logo-menu small{
                display:block;
                color:#cbd5e1;
                font-size:12px;
                margin-top:2px;
            }
        </style>
    </head>

    <body>

        <nav class="navbar">
            <a href="/cliente/inicio" class="brand">
                <img th:if="${hotelGlobal.logo != null and hotelGlobal.logo != ''}"
                     th:src="${hotelGlobal.logo}"
                     alt="Logo">

                <span th:text="${hotelGlobal.nombreHotel}">HotelControl</span>
            </a>        </nav>

        <main class="container">

            <h1 th:text="${habitacion.tipo} + ' - Habitación ' + ${habitacion.numero}">
                Detalle Habitación
            </h1>

            <div class="layout">

                <section>
                    <img class="foto"
                         alt="Imagen de habitación"
                         th:src="${habitacion.imagen != null and habitacion.imagen != ''
                         ? habitacion.imagen
                         : 'https://images.unsplash.com/photo-1611892440504-42a792e24d32?auto=format&fit=crop&w=800&q=80'}">

                    <p class="desc" th:text="${habitacion.descripcion}">
                        Descripción de la habitación.
                    </p>

                    <div class="features">
                        <div><b>Precio:</b> $<span th:text="${habitacion.precioNoche}"></span> / noche</div>
                        <div><b>Capacidad:</b> <span th:text="${habitacion.capacidad}"></span> personas</div>
                        <div><b>Estado:</b> <span th:text="${habitacion.estado}"></span></div>
                        <div><b>Wi-Fi:</b> Gratis</div>
                    </div>
                </section>

                <section class="right">
                    <h3>Disponibilidad de Fechas</h3>

                    <div id="calendario-reservas"></div>

                    <a class="btn"
                       th:href="@{/cliente/reserva/{id}(id=${habitacion.idHabitacion})}">
                        CONTINUAR CON LA RESERVA
                    </a>
                </section>

            </div>

            <a href="/cliente/inicio" class="volver">← Volver al catálogo</a>

        </main>

        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

        <script th:inline="javascript">
            let fechasOcupadas = [];

            /*[# th:each="r : ${reservas}"]*/
            fechasOcupadas.push({
            from: /*[[${r.fechaCheckIn}]]*/ '',
            to: /*[[${r.fechaCheckOut}]]*/ ''
            });
            /*[/]*/

            document.addEventListener("DOMContentLoaded", function () {
            flatpickr("#calendario-reservas", {
            inline: true,
            locale: "es",
            minDate: "today",
            disable: fechasOcupadas,

            onDayCreate: function (dObj, dStr, fp, dayElem) {
            let dia = dayElem.dateObj;
            dia.setHours(0, 0, 0, 0);

            fechasOcupadas.forEach(function (r) {
            let i = r.from.split("-");
            let f = r.to.split("-");

            let inicio = new Date(i[0], i[1] - 1, i[2]);
            let fin = new Date(f[0], f[1] - 1, f[2]);

            inicio.setHours(0, 0, 0, 0);
            fin.setHours(0, 0, 0, 0);

            if (dia >= inicio && dia <= fin) {
            dayElem.classList.add("fecha-reservada");
            }
            });
            }
            });
            });
        </script>

    </body>
</html>
