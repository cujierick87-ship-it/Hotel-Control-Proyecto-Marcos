<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HotelControl - Registro de Cliente</title>

        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            body {
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .register-card {
                background-color: #1e293b;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
                width: 100%;
                max-width: 550px;
                border: 1px solid #334155;
            }

            .register-header {
                text-align: center;
                margin-bottom: 25px;
            }

            .register-header h2 {
                color: #ffffff;
                font-size: 26px;
                margin-bottom: 5px;
            }

            .register-header p {
                color: #94a3b8;
                font-size: 14px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .form-group label {
                display: block;
                color: #cbd5e1;
                margin-bottom: 6px;
                font-size: 14px;
                font-weight: 500;
            }

            .form-group input {
                width: 100%;
                padding: 11px;
                background-color: #0f172a;
                border: 1px solid #475569;
                border-radius: 6px;
                color: #ffffff;
                font-size: 14px;
                transition: border-color 0.3s;
            }

            .form-group input:focus {
                outline: none;
                border-color: #fbbf24;
            }

            .mensaje-error {
                display: block;
                background-color: #7f1d1d;
                color: #fecaca;
                padding: 7px;
                border-radius: 5px;
                font-size: 13px;
                margin-bottom: 6px;
                border: 1px solid #ef4444;
            }

            .btn-register {
                width: 100%;
                padding: 12px;
                background-color: #fbbf24;
                color: #0f172a;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.3s;
                margin-top: 10px;
            }

            .btn-register:hover {
                background-color: #f59e0b;
            }

            .register-footer {
                margin-top: 20px;
                text-align: center;
            }

            .register-footer a {
                color: #fbbf24;
                text-decoration: none;
                font-size: 14px;
            }

            .register-footer a:hover {
                text-decoration: underline;
            }
        </style>
    </head>

    <body>
        <div class="register-card">

            <div class="register-header">
                <h2>Crear Cuenta</h2>
                <p>Regístrese para realizar reservas en línea</p>
            </div>

            <form th:action="@{/registro}" method="post" th:object="${nuevoUsuario}">
                <div class="form-group"><label for="nombres">Nombres</label>
                    <input type="text" id="nombres" th:field="*{nombres}" placeholder="Ej. Erick" required></div>

                <div class="form-group"><label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" th:field="*{apellidos}" placeholder="Ej. Cuji" required></div>

                <div class="form-group"><label for="cedula">Cédula</label>
                    <input type="text" id="cedula" th:field="*{cedula}" placeholder="Ej. 1726354120" required></div>

                <div class="form-group"><label for="telefono">Teléfono</label>
                    <small class="mensaje-error" th:if="${errorTelefono}" th:text="${errorTelefono}"></small>
                    <input type="text" id="telefono" th:field="*{telefono}" placeholder="Ej. 0987654321" required></div>

                <div class="form-group"><label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" th:field="*{correo}" placeholder="Ej. cliente@correo.com" required></div>

                <div class="form-group"><label for="nombreUsuario">Nombre de usuario</label>
                    <small class="mensaje-error" th:if="${errorUsuario}" th:text="${errorUsuario}"></small>
                    <input type="text" id="nombreUsuario" th:field="*{nombreUsuario}" placeholder="Elija un nombre de usuario" required></div>

                <div class="form-group"><label for="passwordHash">Contraseña</label>
                    <small class="mensaje-error" th:if="${errorPassword}" th:text="${errorPassword}"></small>
                    <input type="password" id="passwordHash" th:field="*{passwordHash}" placeholder="Cree una contraseña" required></div>

                <button type="submit" class="btn-register">Registrarse</button>
            </form>

            <div class="register-footer">
                <a href="/login">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>

        </div>
    </body>
</html>
