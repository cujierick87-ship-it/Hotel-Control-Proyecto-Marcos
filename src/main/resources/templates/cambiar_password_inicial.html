<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cambiar Contraseña - HotelControl</title>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; width: 420px; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #1e293b; text-align: center; }
        p { color: #4b5563; text-align: center; }
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #374151; }
        input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 5px; box-sizing: border-box; }
        .error { background: #fee2e2; color: #991b1b; padding: 8px; border-radius: 5px; margin-bottom: 7px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #fbbf24; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>

<body>

<div class="card">
    <h2>Cambio de Contraseña</h2>
    <p>Por seguridad, debe cambiar su contraseña inicial antes de ingresar al panel.</p>

    <form th:action="@{/cambiar-password-inicial}" method="post">

        <div class="campo">
            <label>Contraseña actual</label>
            <div class="error" th:if="${errorActual}" th:text="${errorActual}"></div>
            <input type="password" name="passwordActual" required>
        </div>

        <div class="campo">
            <label>Nueva contraseña</label>
            <div class="error" th:if="${errorNueva}" th:text="${errorNueva}"></div>
            <input type="password" name="nuevaPassword" required>
        </div>

        <div class="campo">
            <label>Confirmar nueva contraseña</label>
            <div class="error" th:if="${errorConfirmar}" th:text="${errorConfirmar}"></div>
            <input type="password" name="confirmarPassword" required>
        </div>

        <button type="submit">Cambiar Contraseña</button>
    </form>
</div>

</body>
</html>
