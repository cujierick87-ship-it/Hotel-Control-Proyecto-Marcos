<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Solicitud a Administración</title>

    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
        body{background:#f3f4f6;color:#1f2937}
        .top{background:#1e293b;color:white;padding:15px 35px;display:flex;justify-content:space-between}
        .top h2{color:#fbbf24;font-size:20px}
        .top a{color:white;text-decoration:none}
        .card{max-width:650px;margin:40px auto;background:white;padding:25px;border-radius:8px;box-shadow:0 3px 10px #0002}
        h3{margin-bottom:18px;color:#1e293b}
        label{font-weight:bold;font-size:13px;color:#374151;margin-bottom:5px;display:block}
        select,textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:5px;margin-bottom:15px}
        textarea{resize:vertical}
        .footer{display:flex;justify-content:space-between;align-items:center}
        .btn{background:#e5c158;color:white;border:0;padding:11px 18px;border-radius:5px;font-weight:bold;cursor:pointer}
        .volver{color:#555;text-decoration:none}
    </style>
</head>

<body>

<div class="top">
    <h2>📨 Solicitud a Administración</h2>
    <a href="/recepcion/panel">Volver al panel</a>
</div>

<div class="card">
    <h3>Enviar solicitud, queja o comentario</h3>

    <form th:action="@{/recepcion/solicitud/guardar}" method="post" th:object="${solicitud}">

        <label>Tipo</label>
        <select th:field="*{tipo}" required>
            <option value="">Seleccione una opción</option>
            <option value="SOLICITUD">Solicitud</option>
            <option value="QUEJA">Queja</option>
            <option value="COMENTARIO">Comentario</option>
        </select>

        <label>Mensaje</label>
        <textarea th:field="*{mensaje}" rows="6" required placeholder="Escriba el mensaje para administración..."></textarea>

        <div class="footer">
            <a href="/recepcion/panel" class="volver">← Cancelar</a>
            <button type="submit" class="btn">Enviar</button>
        </div>
    </form>
</div>

</body>
</html>
