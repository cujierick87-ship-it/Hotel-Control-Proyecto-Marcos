<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Completar Reserva</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', sans-serif;
            }
            body {
                background-color: #f8f9fa;
                color: #333;
            }

            .navbar {
                background-color: #1e293b;
                padding: 15px 50px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .navbar-brand {
                font-size: 20px;
                font-weight: bold;
                color: #eab308;
                text-decoration: none;
            }

            .container {
                max-width: 800px;
                margin: 40px auto;
                background: white;
                padding: 40px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                border-radius: 4px;
                border: 1px solid #eaeaea;
            }

            .header-title {
                font-size: 24px;
                color: #1e293b;
                margin-bottom: 30px;
                padding-bottom: 10px;
                border-bottom: 1px solid #eee;
            }

            /* Sistema de Grid para las dos columnas */
            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin-bottom: 20px;
            }
            .full-width {
                grid-column: span 2;
            }

            .form-group {
                display: flex;
                flex-direction: column;
            }
            .form-control {
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 2px;
                font-size: 14px;
                color: #555;
                transition: border-color 0.2s;
            }
            .form-control:focus {
                outline: none;
                border-color: #e5c158;
            }

            .nota-req {
                font-size: 12px;
                color: #777;
                margin-top: 5px;
            }

            .form-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 30px;
            }

            .btn-reservar {
                background-color: #e5c158;
                color: white;
                padding: 15px 30px;
                text-decoration: none;
                border: none;
                font-size: 16px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 1px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .btn-reservar:hover {
                background-color: #d4af37;
            }

            .btn-volver {
                color: #666;
                text-decoration: none;
                font-size: 14px;
            }
            .btn-volver:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>

        <nav class="navbar">
            <a href="/cliente/inicio" class="navbar-brand">🏨 HotelControl</a>
        </nav>

        <div class="container">
            <h2 class="header-title">Detalles de su Reserva - <span th:text="${habitacion.tipo}"></span> Hab. <span th:text="${habitacion.numero}"></span></h2>

            <form th:action="@{/cliente/reserva/guardar}" th:object="${nuevaReserva}" method="post">

                <input type="hidden" name="idHab" th:value="${habitacion.idHabitacion}" />

                <div class="form-grid">
                    <div class="form-group">
                        <input type="date" class="form-control" th:field="*{fechaCheckIn}" required title="Fecha de Inicio">
                    </div>
                    <div class="form-group">
                        <input type="date" class="form-control" th:field="*{fechaCheckOut}" required title="Fecha de Término">
                    </div>

                    <div class="form-group">
                        <input type="text" class="form-control" th:field="*{nombreCliente}" placeholder="Nombre*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" th:field="*{apellidoCliente}" placeholder="Apellido*" required>
                    </div>

                    <div class="form-group">
                        <input type="text" class="form-control" th:field="*{cedulaCliente}" placeholder="Cédula/Pasaporte*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" th:field="*{telefono}" placeholder="Móvil (Ej: 099...)">
                    </div>

                    <div class="form-group">
                        <input type="email" class="form-control" th:field="*{correo}" placeholder="Correo electrónico*" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" th:field="*{direccion}" placeholder="Dirección">
                    </div>
                    <div class="form-group full-width">
                        <textarea class="form-control" th:field="*{notas}" rows="3" placeholder="Notas: Agregue cualquier información necesaria para su estadía. Estaremos encantados de ayudarle."></textarea>
                    </div>


                </div>

                <div class="form-footer">
                    <div>
                        <span class="nota-req">* - campo requerido</span><br>
                        <a href="/cliente/inicio" class="btn-volver">← Volver</a>
                    </div>
                    <button type="submit" class="btn-reservar">HACER UNA RESERVA</button>
                </div>

            </form>
        </div>

    </body>
</html>
