<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Completar Reserva</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', sans-serif;
            }
            body {
                background-color: #f8f9fa;
                color: #333;
            }

            .navbar {
                background-color: #1e293b;
                padding: 15px 50px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .navbar-brand {
                font-size: 20px;
                font-weight: bold;
                color: #eab308;
                text-decoration: none;
            }

            .container {
                max-width: 800px;
                margin: 40px auto;
                background: white;
                padding: 30px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                border-radius: 4px;
                border: 1px solid #eaeaea;
            }

            .header-title {
                font-size: 22px;
                color: #1e293b;
                margin-bottom: 25px;
                padding-bottom: 10px;
                border-bottom: 1px solid #eee;
            }

            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                margin-bottom: 20px;
            }
            .full-width {
                grid-column: span 2;
            }

            .form-control {
                width: 100%;
                padding: 11px;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-size: 14px;
                color: #555;
                outline: none;
                transition: border-color 0.2s;
            }
            .form-control:focus {
                border-color: #e5c158;
                box-shadow: 0 0 0 2px rgba(229, 193, 88, 0.2);
            }

            .form-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 15px;
            }
            .btn-reservar {
                background-color: #e5c158;
                color: white;
                padding: 12px 25px;
                border: none;
                border-radius: 4px;
                font-size: 15px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 1px;
                cursor: pointer;
                transition: background 0.2s;
            }
            .btn-reservar:hover {
                background-color: #d4af37;
            }
            .btn-volver {
                color: #666;
                text-decoration: none;
                font-size: 14px;
            }
            .btn-volver:hover {
                text-decoration: underline;
            }

            .flatpickr-calendar {
                font-size: 13px !important;
                width: auto !important;
            }
            .flatpickr-day {
                height: 33px !important;
                line-height: 33px !important;
                max-width: 33px !important;
                margin: 1px !important;
            }
            .flatpickr-months {
                padding: 0 5px !important;
            }

            .flatpickr-day.flatpickr-disabled,
            .flatpickr-day.prevMonthDay,
            .flatpickr-day.nextMonthDay {
                background-color: #fca5a5 !important;
                color: #7f1d1d !important;
                border-color: white !important;
                border-radius: 0 !important;
                opacity: 1 !important;
            }

            .flatpickr-day:not(.flatpickr-disabled):not(.prevMonthDay):not(.nextMonthDay) {
                background-color: #bbf7d0 !important;
                color: #065f46 !important;
                border-color: white !important;
                border-radius: 0 !important;
            }

            .flatpickr-day:not(.flatpickr-disabled):hover {
                background-color: #22c55e !important;
                color: white !important;
            }

            dialog{
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                border: none;
                border-radius: 10px;
                padding: 25px;
                width: 360px;
                max-width: 90%;
                text-align: center;
                box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            }

            dialog::backdrop {
                background: rgba(0,0,0,0.55);
            }

            dialog h3 {
                color: #1e293b;
                margin-bottom: 10px;
            }

            dialog p {
                color: #4b5563;
                margin-bottom: 20px;
            }

            dialog button {
                background-color: #e5c158;
                color: white;
                border: none;
                padding: 10px 18px;
                border-radius: 5px;
                font-weight: bold;
                cursor: pointer;
            }

            dialog button:hover {
                background-color: #d4af37;
            }
            .brand{
                color:#eab308;
                font-size:20px;
                font-weight:bold;
                text-decoration:none;
                display:flex;
                align-items:center;
                gap:10px;
            }

            .brand img{
                width:36px;
                height:36px;
                object-fit:cover;
                border-radius:6px;
                background:white;
            }
        </style>
    </head>
    <body>

        <nav class="navbar">
            <a href="/cliente/inicio" class="brand">
                <img th:if="${hotelGlobal.logo != null and hotelGlobal.logo != ''}"
                     th:src="${hotelGlobal.logo}"
                     alt="Logo">

                <span th:text="${hotelGlobal.nombreHotel}">HotelControl</span>
            </a>
        </nav>

        <div class="container">
            <h2 class="header-title">
                Reserva - <span th:text="${habitacion.tipo}"></span> Hab. <span th:text="${habitacion.numero}"></span>
            </h2>

            <form th:action="@{/cliente/reserva/guardar}"
                  th:object="${nuevaReserva}"
                  method="post"
                  novalidate
                  onsubmit="return validarReservaVacia()">

                <input type="hidden" name="idHab" th:value="${habitacion.idHabitacion}" />

                <div class="form-grid">
                    <input type="text"
                           id="fechaCheckIn"
                           class="form-control"
                           th:field="*{fechaCheckIn}"
                           placeholder="Fecha de Inicio*"
                           required
                           autocomplete="off">

                    <input type="text"
                           id="fechaCheckOut"
                           class="form-control"
                           th:field="*{fechaCheckOut}"
                           placeholder="Fecha de Finalización*"
                           required
                           autocomplete="off">

                    <textarea class="form-control full-width"
                              th:field="*{notas}"
                              rows="4"
                              placeholder="Notas adicionales para su estadía..."></textarea>
                </div>

                <div class="form-footer">
                    <a th:href="@{/cliente/habitacion/detalles/{id}(id=${habitacion.idHabitacion})}" class="btn-volver">
                        ← Volver a detalles
                    </a>

                    <button type="submit" class="btn-reservar">
                        CONFIRMAR RESERVA
                    </button>
                </div>

            </form>
        </div>

        <dialog id="modalCamposReserva">
            <h3>Campos incompletos</h3>
            <p>Por favor llene los campos para realizar la reserva.</p>
            <button type="button" onclick="cerrarModalReserva()">Aceptar</button>
        </dialog>

        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

        <script th:inline="javascript">
            /*<![CDATA[*/
            let fechasOcupadas = [];

            /*[# th:each="r : ${reservas}"]*/
            fechasOcupadas.push({
            from: /*[[${r.fechaCheckIn}]]*/ '',
            to: /*[[${r.fechaCheckOut}]]*/ ''
            });
            /*[/]*/

            document.addEventListener('DOMContentLoaded', function() {

            const checkOutPicker = flatpickr("#fechaCheckOut", {
            locale: "es",
            dateFormat: "Y-m-d",
            minDate: "today",
            disable: fechasOcupadas,
            showMonths: 2
            });

            flatpickr("#fechaCheckIn", {
            locale: "es",
            dateFormat: "Y-m-d",
            minDate: "today",
            disable: fechasOcupadas,
            showMonths: 2,
            onChange: function(selectedDates) {
            if (selectedDates.length > 0) {
            let minSalida = new Date(selectedDates[0]);
            minSalida.setDate(minSalida.getDate() + 1);
            checkOutPicker.set("minDate", minSalida);
            }
            }
            });

            });

            function validarReservaVacia() {
            let fechaInicio = document.getElementById("fechaCheckIn").value.trim();
            let fechaSalida = document.getElementById("fechaCheckOut").value.trim();

            if (fechaInicio === "" || fechaSalida === "") {
            document.getElementById("modalCamposReserva").showModal();
            return false;
            }

            return true;
            }

            function cerrarModalReserva() {
            document.getElementById("modalCamposReserva").close();
            }
            /*]]>*/
        </script>
    </body>
</html>
